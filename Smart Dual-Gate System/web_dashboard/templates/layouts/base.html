<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} | Smart Dual-Gate Security</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mantrap_visual.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="page">
        {% include "layouts/partials/_sidebar.html" %}
        <div class="page-wrapper">
            {% include "layouts/partials/_navbar.html" %}
            <div class="page-body">
                <div class="container-xl">
                    {% include "layouts/partials/_flash_messages.html" %}
                    {% block content %}{% endblock %}
                </div>
            </div>
            {% include "layouts/partials/_footer.html" %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/labels.js') }}"></script>
    <script src="{{ url_for('static', filename='js/process_control.js') }}"></script>
    <script src="{{ url_for('static', filename='js/mantrap_visual.js') }}"></script>
    <script src="{{ url_for('static', filename='js/polling.js') }}"></script>
    <script>document.addEventListener("DOMContentLoaded", function () {
        window.MantrapProcessControl && window.MantrapProcessControl.init();
        window.MantrapPolling && window.MantrapPolling.startNavbarStatus();
    });</script>
    {% block extra_js %}{% endblock %}
</body>
</html>
