<div class="system-panel">
    <div class="system-panel-header">
        <div>
            <h3>System Control</h3>
            <p>Safe process lifecycle controls</p>
        </div>

        <span id="system-control-status-badge" class="system-panel-status is-stopped">
            STOPPED
        </span>
    </div>

    <div class="system-panel-actions">
        <button type="button" class="system-panel-btn is-start" data-panel-system-action="start">
            <span class="system-panel-icon">▶</span>
            <span>Start System</span>
        </button>

        <button type="button" class="system-panel-btn is-stop" data-panel-system-action="stop">
            <span class="system-panel-icon">■</span>
            <span>Stop System</span>
        </button>
    </div>

    <p id="system-control-message" class="system-panel-message">
        Controls manage the mantrap process only. Hardware and cameras remain isolated from the dashboard.
    </p>
</div>

<style>
    header [data-system-action],
    nav [data-system-action],
    .navbar [data-system-action],
    .topbar [data-system-action] {
        display: none !important;
    }

    .system-panel {
        background: transparent;
        border-radius: 0;
    }

    .system-panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        padding-bottom: 1.15rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .system-panel-header h3 {
        margin: 0;
        color: #ffffff;
        font-size: 1rem;
        font-weight: 800;
    }

    .system-panel-header p {
        margin: 0.45rem 0 0 0;
        color: #8aa0bd;
        font-size: 0.86rem;
    }

    .system-panel-status {
        min-width: 92px;
        text-align: center;
        border-radius: 999px;
        padding: 0.48rem 0.9rem;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.04em;
        border: 1px solid transparent;
    }

    .system-panel-status.is-running {
        color: #86efac;
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.45);
    }

    .system-panel-status.is-stopped {
        color: #fca5a5;
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.45);
    }

    .system-panel-status.is-working {
        color: #fde68a;
        background: rgba(245, 158, 11, 0.12);
        border-color: rgba(245, 158, 11, 0.45);
    }

    .system-panel-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(150px, 1fr));
        gap: 0.9rem;
        padding-top: 1.25rem;
        max-width: 390px;
    }

    .system-panel-btn {
        height: 44px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 0.75rem;
        padding: 0 1rem;
        color: #ffffff;
        font-size: 0.86rem;
        font-weight: 800;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        cursor: pointer;
        white-space: nowrap;
        transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        box-shadow: none;
    }

    .system-panel-btn:hover {
        transform: translateY(-1px);
    }

    .system-panel-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
    }

    .system-panel-icon {
        width: 1.35rem;
        height: 1.35rem;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        background: rgba(255, 255, 255, 0.14);
    }

    .system-panel-btn.is-start {
        background: rgba(34, 197, 94, 0.14);
        border-color: rgba(34, 197, 94, 0.42);
        color: #86efac;
    }

    .system-panel-btn.is-stop {
        background: rgba(239, 68, 68, 0.14);
        border-color: rgba(239, 68, 68, 0.42);
        color: #fca5a5;
    }

    .system-panel-message {
        margin: 1.05rem 0 0 0;
        color: #8aa0bd;
        font-size: 0.88rem;
    }

    @media (max-width: 520px) {
        .system-panel-header {
            flex-direction: column;
        }

        .system-panel-actions {
            grid-template-columns: 1fr;
            max-width: 100%;
        }
    }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const buttons = document.querySelectorAll("[data-panel-system-action]");
    const messageBox = document.getElementById("system-control-message");
    const statusBadge = document.getElementById("system-control-status-badge");

    function getCsrfToken() {
        const meta = document.querySelector('meta[name="csrf-token"]');
        return meta ? meta.getAttribute("content") : "";
    }

    function setButtonsDisabled(isDisabled) {
        buttons.forEach(function (button) {
            button.disabled = isDisabled;
        });
    }

    function setMessage(text, isError = false) {
        if (!messageBox) {
            return;
        }

        messageBox.textContent = text;
        messageBox.style.color = isError ? "#fca5a5" : "#8aa0bd";
    }

    function setStatus(status) {
        if (!statusBadge) {
            return;
        }

        const normalized = (status || "STOPPED").toUpperCase();
        statusBadge.textContent = normalized;

        statusBadge.classList.remove("is-running", "is-stopped", "is-working");

        if (normalized === "RUNNING") {
            statusBadge.classList.add("is-running");
        } else if (normalized === "STARTING" || normalized === "STOPPING" || normalized === "WORKING") {
            statusBadge.classList.add("is-working");
        } else {
            statusBadge.classList.add("is-stopped");
        }
    }

    async function refreshProcessStatus() {
        try {
            const response = await fetch("/api/system/process-status");
            const result = await response.json();

            if (result.success && result.data) {
                setStatus(result.data.lifecycle);

                if (result.data.message) {
                    setMessage(result.data.message);
                }
            }
        } catch (error) {
            console.warn("Unable to refresh process status", error);
        }
    }

    async function runSystemAction(action) {
        const labels = {
            start: "start the mantrap system",
            stop: "stop the mantrap system",
        };

        if (!labels[action]) {
            return;
        }

        if (!window.confirm("Are you sure you want to " + labels[action] + "?")) {
            return;
        }

        setButtonsDisabled(true);
        setStatus("WORKING");
        setMessage("Running control command...");

        try {
            const response = await fetch("/api/system/" + action, {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCsrfToken(),
                    "Content-Type": "application/json",
                },
            });

            const result = await response.json();

            if (!result.success) {
                setMessage(result.error || "Control command failed.", true);
                return;
            }

            if (result.data && result.data.process) {
                setStatus(result.data.process.lifecycle);
            }

            setMessage(result.data && result.data.message ? result.data.message : "Control command completed.");
        } catch (error) {
            console.error(error);
            setMessage("Unable to reach the control API.", true);
        } finally {
            setButtonsDisabled(false);
            refreshProcessStatus();
        }
    }

    buttons.forEach(function (button) {
        button.addEventListener("click", function () {
            runSystemAction(button.dataset.panelSystemAction);
        });
    });

    refreshProcessStatus();
    setInterval(refreshProcessStatus, 3000);
});
</script>
