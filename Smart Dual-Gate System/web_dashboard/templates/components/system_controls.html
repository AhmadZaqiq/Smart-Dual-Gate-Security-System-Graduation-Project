<div class="card system-control-card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <div>
            <h3 class="card-title mb-0"><i class="ti ti-power me-2"></i>System Control</h3>
            <div class="text-secondary small">Safe process lifecycle and workflow standby controls</div>
        </div>
        <span class="status-pill process-badge" id="process-lifecycle-badge" data-state="UNKNOWN">UNKNOWN</span>
    </div>
    <div class="card-body">
        <div class="d-flex flex-wrap gap-2">
            <button type="button" class="btn btn-success btn-action system-control-btn" data-action="start">
                <i class="ti ti-player-play"></i> Start System
            </button>
            <button type="button" class="btn btn-danger btn-action system-control-btn" data-action="stop">
                <i class="ti ti-player-stop"></i> Stop System
            </button>
            <button type="button" class="btn btn-warning btn-action system-control-btn" data-action="restart">
                <i class="ti ti-refresh"></i> Restart System
            </button>
            <button type="button" class="btn btn-azure btn-action system-control-btn" data-action="reset-idle">
                <i class="ti ti-restore"></i> Reset to Idle
            </button>
        </div>
        <p class="text-secondary small mt-3 mb-0" id="process-control-message">
            Controls manage the mantrap process only. Hardware and cameras remain isolated from the dashboard.
        </p>
    </div>
</div>
